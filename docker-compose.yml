services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile  
    environment:
      ConnectionStrings__DefaultConnection: "User ID=${DB_USER};Password=${DB_PASSWORD};Host=db;Port=5432;Database=${DB_NAME};"
    ports:
      - "${PORT}:8080"
    depends_on:
      - db

volumes:
  postgres_data: